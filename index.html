<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Exclusive Souvenir</title>
    <meta name="description" content="Download your personalized Marie Curie game archive.">
    <link rel="stylesheet" href="style.css">
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap"
        rel="stylesheet">
</head>

<body>
    <div class="background-animation"></div>
    <div class="card">
        <div class="content">
            <h1 class="title">Le jeu de <span class="highlight">Marie Curie</span></h1>
            <p class="subtitle">Thank you for playing! We hope you enjoyed the Le jeu de Marie Curie. Click the button
                below to download the game you just played.</p>

            <button id="downloadBtn" class="premium-button">
                <span class="button-content">
                    <svg class="icon" fill="none" stroke="currentColor" viewBox="0 0 24 24"
                        xmlns="http://www.w3.org/2000/svg">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10">
                        </path>
                    </svg>
                    Download Game Archive
                </span>
                <span class="loading-ring"></span>
            </button>
            <p id="statusText" class="status-text"></p>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
